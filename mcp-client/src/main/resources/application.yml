server:
  port: 8089

spring:
  application:
    name: demo

  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: never
        embedding:
          include: false
      chat:
        embedding: none
        model: mistral:7b # mistral:7b, qwen3-5:9b
        options:
          temperature: 0.1
          keep-alive: 30m

    mcp:
      client:
        enabled: true
        name: swagger-ai-client
        version: 1.0.0
        type: SYNC
        request-timeout: 120s
        toolcallback:
          enabled: true
        sse:
          connections: {}
        streamable-http:
          connections:
            swagger-server:
              url: http://localhost:8080
              endpoint: /mcp



